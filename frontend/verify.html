<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificar Cuenta - Fidelix</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .verify-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .verify-card {
      background: white; border-radius: var(--radius-lg); padding: 48px 40px;
      text-align: center; max-width: 440px; width: 100%;
      border: 1px solid var(--gray-200); box-shadow: var(--shadow-lg);
    }
    .verify-icon { font-size: 3rem; margin-bottom: 16px; display: block; }
    .verify-card h1 { font-size: 1.4rem; font-weight: 700; color: var(--gray-900); margin-bottom: 8px; }
    .verify-card p { color: var(--gray-500); font-size: 0.95rem; line-height: 1.6; }
    .spinner-lg { display: inline-block; width: 40px; height: 40px; border: 4px solid var(--gray-200); border-top-color: var(--primary-500); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 16px; }
  </style>
</head>
<body>
  <main class="verify-page">
    <div class="verify-card" id="verifyCard">
      <div class="spinner-lg"></div>
      <h1>Verificando cuenta...</h1>
      <p>Conectando con el servidor...</p>
    </div>
  </main>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const tipo = params.get('tipo') || 'cliente';
      const card = document.getElementById('verifyCard');

      if (!token) {
        card.innerHTML = `
          <span class="verify-icon">&#10060;</span>
          <h1>Enlace inválido</h1>
          <p>No se encontró el token de verificación. Revisa el enlace del correo.</p>
          <p style="font-size:0.8rem;color:var(--gray-400);margin-top:8px;">URL: ${window.location.href}</p>
          <a href="index.html" class="btn btn-primary" style="margin-top:24px;">Ir al inicio</a>
        `;
        return;
      }

      const endpoint = tipo === 'tienda' ? '/auth/verify-tienda' : '/auth/verify-client';
      const url = `http://localhost:3000${endpoint}?token=${encodeURIComponent(token)}`;

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);

        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timeout);
        const data = await res.json();

        if (res.ok) {
          card.innerHTML = `
            <span class="verify-icon">&#10003;</span>
            <h1>¡Cuenta verificada!</h1>
            <p>${data.mensaje || 'Tu cuenta ha sido verificada exitosamente.'}</p>
            <a href="login.html" class="btn btn-primary" style="margin-top:24px;">Iniciar Sesión</a>
          `;
        } else {
          const esYaVerificado = data.error?.toLowerCase().includes('ya está verificad');
          card.innerHTML = `
            <span class="verify-icon">${esYaVerificado ? '&#10003;' : '&#10060;'}</span>
            <h1>${esYaVerificado ? 'Ya está verificada' : 'Error al verificar'}</h1>
            <p>${data.error || 'No se pudo verificar la cuenta.'}</p>
            ${esYaVerificado ? '<p style="color:var(--gray-400);font-size:0.85rem;">Tu cuenta ya estaba verificada. Puedes iniciar sesión.</p>' : ''}
            <a href="${esYaVerificado ? 'login.html' : 'index.html'}" class="btn btn-primary" style="margin-top:24px;">${esYaVerificado ? 'Iniciar Sesión' : 'Volver al inicio'}</a>
          `;
        }
      } catch (err) {
        const msg = err.name === 'AbortError'
          ? 'El servidor no respondió a tiempo. Asegúrate de que el backend esté corriendo en localhost:3000.'
          : err.message.includes('Failed to fetch')
            ? 'No se pudo conectar con el backend. Asegúrate de que esté corriendo en localhost:3000.'
            : err.message;

        card.innerHTML = `
          <span class="verify-icon">&#10060;</span>
          <h1>Error de conexión</h1>
          <p>${msg}</p>
          <p style="font-size:0.8rem;color:var(--gray-400);margin-top:8px;">URL: ${url}</p>
          <a href="index.html" class="btn btn-primary" style="margin-top:24px;">Volver al inicio</a>
        `;
      }
    })();
  </script>
</body>
</html>
