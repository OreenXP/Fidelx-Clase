<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Tienda - Fidelix</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .dashboard { display: flex; min-height: 100vh; padding-top: 68px; }
    .sidebar {
      width: 260px; background: white; border-right: 1px solid var(--gray-200);
      padding: 24px 16px; display: flex; flex-direction: column; position: fixed;
      top: 68px; bottom: 0; z-index: 10;
    }
    .sidebar-user {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      background: var(--gray-50); border-radius: var(--radius-sm); margin-bottom: 24px;
    }
    .sidebar-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 1rem;
    }
    .sidebar-name { font-size: 0.9rem; font-weight: 600; color: var(--gray-900); }
    .sidebar-email { font-size: 0.75rem; color: var(--gray-400); }
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .sidebar-link {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 500;
      color: var(--gray-600); transition: var(--transition); cursor: pointer; border: none; background: none;
      width: 100%; text-align: left; font-family: inherit;
    }
    .sidebar-link:hover, .sidebar-link.active { background: var(--primary-50); color: var(--primary-600); }
    .sidebar-link.active { font-weight: 600; }
    .sidebar-link svg { width: 20px; height: 20px; flex-shrink: 0; }
    .sidebar-logout {
      margin-top: auto; padding: 10px 12px; border-radius: var(--radius-sm);
      font-size: 0.9rem; font-weight: 500; color: #ef4444;
      background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: var(--transition); width: 100%; font-family: inherit;
    }
    .sidebar-logout:hover { background: #fef2f2; }
    .main-content { flex: 1; margin-left: 260px; padding: 32px 40px; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--gray-900); }
    .page-header p { color: var(--gray-500); font-size: 0.9rem; margin-top: 4px; }
    .table-container {
      background: white; border-radius: var(--radius-lg); border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .table-container table { width: 100%; border-collapse: collapse; }
    .table-container th {
      padding: 14px 20px; text-align: left; font-size: 0.78rem; font-weight: 600;
      color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px;
      background: var(--gray-50); border-bottom: 1px solid var(--gray-200);
    }
    .table-container td {
      padding: 14px 20px; font-size: 0.9rem; color: var(--gray-700);
      border-bottom: 1px solid var(--gray-100);
    }
    .table-container tr:last-child td { border-bottom: none; }
    .table-container tr:hover td { background: var(--gray-50); }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-inactive { background: #fef2f2; color: #991b1b; }
    .actions-cell { display: flex; gap: 8px; }
    .btn-icon {
      padding: 6px; border-radius: 6px; border: none; cursor: pointer;
      background: transparent; color: var(--gray-400); transition: var(--transition);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-icon:hover { background: var(--gray-100); }
    .btn-icon.edit:hover { color: var(--primary-600); }
    .btn-icon.delete:hover { color: #ef4444; }
    .btn-icon svg { width: 18px; height: 18px; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000; padding: 24px; opacity: 0; visibility: hidden;
      transition: var(--transition);
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal {
      background: white; border-radius: var(--radius-lg); width: 100%;
      max-width: 520px; max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-xl); transform: scale(0.95); transition: var(--transition);
    }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--gray-200);
    }
    .modal-header h2 { font-size: 1.15rem; font-weight: 700; color: var(--gray-900); }
    .modal-close {
      background: none; border: none; cursor: pointer; color: var(--gray-400);
      font-size: 1.5rem; line-height: 1; padding: 4px; transition: var(--transition);
    }
    .modal-close:hover { color: var(--gray-600); }
    .modal-body { padding: 24px; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 12px;
      padding: 16px 24px; border-top: 1px solid var(--gray-200);
    }
    .empty-state {
      text-align: center; padding: 60px 24px;
    }
    .empty-state svg { width: 48px; height: 48px; color: var(--gray-300); margin-bottom: 12px; }
    .empty-state h3 { font-size: 1rem; font-weight: 600; color: var(--gray-500); }

    .page-alert {
      padding: 12px 16px; border-radius: var(--radius-sm); font-size: 0.85rem; margin-bottom: 16px; display: none;
    }
    .page-alert.visible { display: block; }
    .page-alert.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .page-alert.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    .spinner-sm {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 24px 16px; }
      .table-container { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo"><span class="logo-icon">&#9670;</span>Fidelix</a>
      <button class="nav-toggle" aria-label="Menú"><span></span><span></span><span></span></button>
      <ul class="nav-menu">
        <li><span id="userNameDisplay" style="font-size:0.9rem;font-weight:500;color:var(--gray-600);"></span></li>
        <li><a href="#" id="logoutLink" class="nav-btn" style="background:#ef4444;">Cerrar Sesión</a></li>
      </ul>
    </div>
  </nav>

  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="avatar">T</div>
        <div>
          <div class="sidebar-name" id="sidebarName">Tienda</div>
          <div class="sidebar-email" id="sidebarEmail">tienda@ejemplo.com</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Productos
        </button>
      </nav>
      <button class="sidebar-logout" id="sidebarLogout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar Sesión
      </button>
    </aside>

    <main class="main-content">
      <div id="pageAlert" class="page-alert"></div>

      <div class="page-header">
        <div>
          <h1>Productos</h1>
          <p>Gestiona el catálogo de tu tienda</p>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Nuevo Producto</button>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Precio</th>
              <th>Descripción</th>
              <th>Estado</th>
              <th style="width:100px;">Acciones</th>
            </tr>
          </thead>
          <tbody id="productsBody">
            <tr><td colspan="5"><div class="empty-state"><div class="spinner-lg" style="margin:0 auto 12px;"></div><h3>Cargando productos...</h3></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Nuevo Producto</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="productForm">
        <div class="modal-body">
          <input type="hidden" id="productId">
          <div class="form-group">
            <label for="prodNombre">Nombre</label>
            <input type="text" id="prodNombre" required autocomplete="off">
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="prodDescripcion">Descripción</label>
            <textarea id="prodDescripcion" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label for="prodPrecio">Precio ($)</label>
            <input type="number" id="prodPrecio" step="0.01" min="0.01" required>
            <div class="form-error"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary btn-sm" id="saveBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    const API = 'http://localhost:3000';
    const token = localStorage.getItem('token');
    const tipo = localStorage.getItem('tipo');
    const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');

    if (!token || tipo !== 'tienda') {
      window.location.href = 'login.html';
    }

    const tiendaId = usuario.id;
    const nombre = usuario.nombre || 'Tienda';
    const email = usuario.email || '';
    const initial = nombre.charAt(0).toUpperCase();

    document.getElementById('avatar').textContent = initial;
    document.getElementById('sidebarName').textContent = nombre;
    document.getElementById('sidebarEmail').textContent = email;
    document.getElementById('userNameDisplay').textContent = `Hola, ${nombre}`;

    async function api(path, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${API}${path}`, { ...options, headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || data.mensaje || 'Error en la solicitud');
      return data;
    }

    async function logout() {
      try { await api('/api/logout', { method: 'POST' }); } catch (e) {}
      localStorage.removeItem('token');
      localStorage.removeItem('tipo');
      localStorage.removeItem('usuario');
      window.location.href = 'index.html';
    }

    document.getElementById('logoutLink').addEventListener('click', (e) => { e.preventDefault(); logout(); });
    document.getElementById('sidebarLogout').addEventListener('click', logout);

    async function loadProducts() {
      const tbody = document.getElementById('productsBody');
      try {
        const res = await api(`/products?tiendaId=${tiendaId}`);
        const productos = res.data || [];
        if (!productos.length) {
          tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            <h3>No hay productos todavía</h3>
            <p style="color:var(--gray-400);font-size:0.85rem;margin-top:4px;">Crea tu primer producto</p>
          </div></td></tr>`;
          return;
        }
        tbody.innerHTML = productos.map(p => `
          <tr>
            <td><strong>${p.nombre}</strong></td>
            <td>$${parseFloat(p.precio).toFixed(2)}</td>
            <td style="color:var(--gray-400);max-width:250px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.descripcion || '—'}</td>
            <td><span class="badge ${p.estado === 'activo' ? 'badge-active' : 'badge-inactive'}">${p.estado || 'activo'}</span></td>
            <td class="actions-cell">
              <button class="btn-icon edit" onclick="editProduct('${p.id}', '${p.nombre.replace(/'/g, "\\'")}', '${(p.descripcion || '').replace(/'/g, "\\'")}', ${p.precio})" title="Editar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="btn-icon delete" onclick="deleteProduct('${p.id}')" title="Eliminar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <h3 style="color:#ef4444;">Error al cargar productos</h3>
          <p style="color:var(--gray-400);font-size:0.85rem;">${e.message}</p>
        </div></td></tr>`;
      }
    }

    function openModal(product) {
      document.getElementById('modalTitle').textContent = product ? 'Editar Producto' : 'Nuevo Producto';
      document.getElementById('productId').value = product ? product.id : '';
      document.getElementById('prodNombre').value = product ? product.nombre : '';
      document.getElementById('prodDescripcion').value = product ? (product.descripcion || '') : '';
      document.getElementById('prodPrecio').value = product ? product.precio : '';
      document.getElementById('productModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('productModal').classList.remove('active');
    }

    document.getElementById('productModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    function editProduct(id, nombre, descripcion, precio) {
      openModal({ id, nombre, descripcion, precio });
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-sm"></span> Guardando...';

      const id = document.getElementById('productId').value;
      const data = {
        nombre: document.getElementById('prodNombre').value.trim(),
        descripcion: document.getElementById('prodDescripcion').value.trim() || undefined,
        precio: parseFloat(document.getElementById('prodPrecio').value),
        idTienda: tiendaId,
      };

      try {
        if (id) {
          delete data.idTienda;
          await api(`/products/${id}`, { method: 'PUT', body: JSON.stringify(data) });
          showAlert('Producto actualizado correctamente', 'success');
        } else {
          await api('/products', { method: 'POST', body: JSON.stringify(data) });
          showAlert('Producto creado correctamente', 'success');
        }
        closeModal();
        await loadProducts();
      } catch (err) {
        showAlert(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Guardar';
      }
    });

    async function deleteProduct(id) {
      if (!confirm('¿Eliminar este producto?')) return;
      try {
        await api(`/products/${id}`, { method: 'DELETE' });
        showAlert('Producto eliminado', 'success');
        await loadProducts();
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }

    function showAlert(message, type) {
      const el = document.getElementById('pageAlert');
      el.textContent = message;
      el.className = `page-alert ${type} visible`;
      setTimeout(() => el.classList.remove('visible'), 4000);
    }

    loadProducts();
  </script>
</body>
</html>
