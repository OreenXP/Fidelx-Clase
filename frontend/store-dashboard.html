<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Tienda - Fidelix</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .dashboard { display: flex; min-height: 100vh; padding-top: 68px; }
    .sidebar {
      width: 260px; background: white; border-right: 1px solid var(--gray-200);
      padding: 24px 16px; display: flex; flex-direction: column; position: fixed;
      top: 68px; bottom: 0; z-index: 10;
    }
    .sidebar-user {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      background: var(--gray-50); border-radius: var(--radius-sm); margin-bottom: 24px;
    }
    .sidebar-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 1rem;
    }
    .sidebar-name { font-size: 0.9rem; font-weight: 600; color: var(--gray-900); }
    .sidebar-email { font-size: 0.75rem; color: var(--gray-400); }
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .sidebar-link {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 500;
      color: var(--gray-600); transition: var(--transition); cursor: pointer; border: none; background: none;
      width: 100; text-align: left; font-family: inherit;
    }
    .sidebar-link:hover, .sidebar-link.active { background: var(--primary-50); color: var(--primary-600); }
    .sidebar-link.active { font-weight: 600; }
    .sidebar-link svg { width: 20px; height: 20px; flex-shrink: 0; }
    .sidebar-logout {
      margin-top: auto; padding: 10px 12px; border-radius: var(--radius-sm);
      font-size: 0.9rem; font-weight: 500; color: #ef4444;
      background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: var(--transition); width: 100%; font-family: inherit;
    }
    .sidebar-logout:hover { background: #fef2f2; }
    .main-content { flex: 1; margin-left: 260px; padding: 32px 40px; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--gray-900); }
    .page-header p { color: var(--gray-500); font-size: 0.9rem; margin-top: 4px; }
    .table-container {
      background: white; border-radius: var(--radius-lg); border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .table-container table { width: 100%; border-collapse: collapse; }
    .table-container th {
      padding: 14px 20px; text-align: left; font-size: 0.78rem; font-weight: 600;
      color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px;
      background: var(--gray-50); border-bottom: 1px solid var(--gray-200);
    }
    .table-container td {
      padding: 14px 20px; font-size: 0.9rem; color: var(--gray-700);
      border-bottom: 1px solid var(--gray-100);
    }
    .table-container tr:last-child td { border-bottom: none; }
    .table-container tr:hover td { background: var(--gray-50); }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-inactive { background: #fef2f2; color: #991b1b; }
    .badge-pending { background: #fef9c3; color: #854d0e; }
    .actions-cell { display: flex; gap: 8px; }
    .btn-icon {
      padding: 6px; border-radius: 6px; border: none; cursor: pointer;
      background: transparent; color: var(--gray-400); transition: var(--transition);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-icon:hover { background: var(--gray-100); }
    .btn-icon.edit:hover { color: var(--primary-600); }
    .btn-icon.delete:hover { color: #ef4444; }
    .btn-icon svg { width: 18px; height: 18px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000; padding: 24px; opacity: 0; visibility: hidden;
      transition: var(--transition);
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal {
      background: white; border-radius: var(--radius-lg); width: 100%;
      max-width: 520px; max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-xl); transform: scale(0.95); transition: var(--transition);
    }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--gray-200);
    }
    .modal-header h2 { font-size: 1.15rem; font-weight: 700; color: var(--gray-900); }
    .modal-close {
      background: none; border: none; cursor: pointer; color: var(--gray-400);
      font-size: 1.5rem; line-height: 1; padding: 4px; transition: var(--transition);
    }
    .modal-close:hover { color: var(--gray-600); }
    .modal-body { padding: 24px; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 12px;
      padding: 16px 24px; border-top: 1px solid var(--gray-200);
    }
    .empty-state {
      text-align: center; padding: 60px 24px;
    }
    .empty-state svg { width: 48px; height: 48px; color: var(--gray-300); margin-bottom: 12px; }
    .empty-state h3 { font-size: 1rem; font-weight: 600; color: var(--gray-500); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .page-alert {
      padding: 12px 16px; border-radius: var(--radius-sm); font-size: 0.85rem; margin-bottom: 16px; display: none;
    }
    .page-alert.visible { display: block; }
    .page-alert.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .page-alert.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 24px 16px; }
      .table-container { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo"><span class="logo-icon">&#9670;</span>Fidelix</a>
      <button class="nav-toggle" aria-label="Menú"><span></span><span></span><span></span></button>
      <ul class="nav-menu">
        <li><span id="userNameDisplay" style="font-size:0.9rem;font-weight:500;color:var(--gray-600);"></span></li>
        <li><a href="#" id="logoutLink" class="nav-btn" style="background:#ef4444;">Cerrar Sesión</a></li>
      </ul>
    </div>
  </nav>

  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="avatar">T</div>
        <div>
          <div class="sidebar-name" id="sidebarName">Tienda</div>
          <div class="sidebar-email" id="sidebarEmail">tienda@ejemplo.com</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-link active" data-tab="productos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Productos
        </button>
        <button class="sidebar-link" data-tab="promociones">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Promociones
        </button>
      </nav>
      <button class="sidebar-logout" id="sidebarLogout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar Sesión
      </button>
    </aside>

    <main class="main-content">
      <div id="pageAlert" class="page-alert"></div>

      <!-- TAB: Productos -->
      <div id="tabProductos" class="tab-content active">
        <div class="page-header">
          <div>
            <h1>Productos</h1>
            <p>Gestiona el catálogo de tu tienda</p>
          </div>
          <button class="btn btn-primary btn-sm" onclick="openProductModal()">+ Nuevo Producto</button>
        </div>
        <div class="table-container" id="productsTableContainer">
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="productsBody">
              <tr><td colspan="4"><div class="empty-state"><h3>Cargando productos...</h3></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- TAB: Promociones -->
      <div id="tabPromociones" class="tab-content">
        <div class="page-header">
          <div>
            <h1>Promociones</h1>
            <p>Administra las promociones activas</p>
          </div>
          <button class="btn btn-primary btn-sm" onclick="openPromoModal()">+ Nueva Promoción</button>
        </div>
        <div class="table-container" id="promosTableContainer">
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Producto</th>
                <th>Meta</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="promosBody">
              <tr><td colspan="5"><div class="empty-state"><h3>Cargando promociones...</h3></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Producto -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="productModalTitle">Nuevo Producto</h2>
        <button class="modal-close" onclick="closeModal('productModal')">&times;</button>
      </div>
      <form id="productForm">
        <div class="modal-body">
          <input type="hidden" id="productId">
          <div class="form-group">
            <label for="prodNombre">Nombre</label>
            <input type="text" id="prodNombre" required>
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="prodDescripcion">Descripción</label>
            <textarea id="prodDescripcion" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label for="prodPrecio">Precio</label>
            <input type="number" id="prodPrecio" step="0.01" min="0" required>
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="prodImagen">URL de imagen (opcional)</label>
            <input type="url" id="prodImagen" placeholder="https://ejemplo.com/imagen.jpg">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" onclick="closeModal('productModal')">Cancelar</button>
          <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Promoción -->
  <div class="modal-overlay" id="promoModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="promoModalTitle">Nueva Promoción</h2>
        <button class="modal-close" onclick="closeModal('promoModal')">&times;</button>
      </div>
      <form id="promoForm">
        <div class="modal-body">
          <input type="hidden" id="promoId">
          <div class="form-group">
            <label for="promoNombre">Nombre</label>
            <input type="text" id="promoNombre" required>
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="promoDescripcion">Descripción</label>
            <textarea id="promoDescripcion" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label for="promoProducto">Producto</label>
            <select id="promoProducto" required>
              <option value="">Seleccionar producto</option>
            </select>
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="promoMeta">Unidades objetivo</label>
            <input type="number" id="promoMeta" min="1" placeholder="Ej: 10" required>
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="promoFechaInicio">Fecha de inicio</label>
            <input type="date" id="promoFechaInicio" required>
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="promoFechaFin">Fecha de fin (opcional)</label>
            <input type="date" id="promoFechaFin">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" onclick="closeModal('promoModal')">Cancelar</button>
          <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const tipo = localStorage.getItem('tipo');
    const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');

    if (!token || tipo !== 'tienda') {
      window.location.href = 'login.html';
    }

    const nombre = usuario.nombre || 'Tienda';
    const email = usuario.email || '';
    const initial = nombre.charAt(0).toUpperCase();
    document.getElementById('avatar').textContent = initial;
    document.getElementById('sidebarName').textContent = nombre;
    document.getElementById('sidebarEmail').textContent = email;
    document.getElementById('userNameDisplay').textContent = `Hola, ${nombre}`;

    // Logout
    async function logout() {
      try { await apiRequest('/api/logout', { method: 'POST' }); } catch (e) {}
      localStorage.removeItem('token');
      localStorage.removeItem('tipo');
      localStorage.removeItem('usuario');
      window.location.href = 'index.html';
    }
    document.getElementById('logoutLink').addEventListener('click', (e) => { e.preventDefault(); logout(); });
    document.getElementById('sidebarLogout').addEventListener('click', logout);

    // Tabs
    document.querySelectorAll('.sidebar-link[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)).classList.add('active');
      });
    });

    // Modales
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', (e) => { if (e.target === el) el.classList.remove('active'); });
    });

    // ===== CRUD Productos (local - demo) =====
    let products = JSON.parse(localStorage.getItem('store_products') || '[]');
    let promos = JSON.parse(localStorage.getItem('store_promos') || '[]');

    function saveState() {
      localStorage.setItem('store_products', JSON.stringify(products));
      localStorage.setItem('store_promos', JSON.stringify(promos));
    }

    function genId() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }

    function renderProducts() {
      const tbody = document.getElementById('productsBody');
      if (!products.length) {
        tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <h3>No hay productos todavía</h3>
        </div></td></tr>`;
        return;
      }
      tbody.innerHTML = products.map(p => `
        <tr>
          <td><strong>${p.nombre}</strong>${p.descripcion ? '<br><span style="font-size:0.8rem;color:var(--gray-400)">'+p.descripcion+'</span>' : ''}</td>
          <td>$${parseFloat(p.precio).toFixed(2)}</td>
          <td><span class="badge ${p.estado === 'activo' ? 'badge-active' : 'badge-inactive'}">${p.estado || 'activo'}</span></td>
          <td class="actions-cell">
            <button class="btn-icon edit" onclick="editProduct('${p.id}')" title="Editar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-icon delete" onclick="deleteProduct('${p.id}')" title="Eliminar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </td>
        </tr>
      `).join('');
    }

    function renderPromos() {
      const tbody = document.getElementById('promosBody');
      if (!promos.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <h3>No hay promociones todavía</h3>
        </div></td></tr>`;
        return;
      }
      tbody.innerHTML = promos.map(p => {
        const prod = products.find(x => x.id === p.idProducto);
        return `<tr>
          <td><strong>${p.nombre}</strong></td>
          <td>${prod ? prod.nombre : '—'}</td>
          <td>${p.unidadesObjetivo} unidades</td>
          <td><span class="badge ${p.estado === 'activa' ? 'badge-active' : 'badge-inactive'}">${p.estado || 'activa'}</span></td>
          <td class="actions-cell">
            <button class="btn-icon edit" onclick="editPromo('${p.id}')" title="Editar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-icon delete" onclick="deletePromo('${p.id}')" title="Eliminar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </td>
        </tr>`;
      }).join('');
    }

    function openProductModal(product) {
      document.getElementById('productModalTitle').textContent = product ? 'Editar Producto' : 'Nuevo Producto';
      document.getElementById('productId').value = product ? product.id : '';
      document.getElementById('prodNombre').value = product ? product.nombre : '';
      document.getElementById('prodDescripcion').value = product ? (product.descripcion || '') : '';
      document.getElementById('prodPrecio').value = product ? product.precio : '';
      document.getElementById('prodImagen').value = product ? (product.imagen_url || '') : '';
      openModal('productModal');
    }

    function editProduct(id) {
      const p = products.find(x => x.id === id);
      if (p) openProductModal(p);
    }

    document.getElementById('productForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const id = document.getElementById('productId').value;
      const data = {
        nombre: document.getElementById('prodNombre').value.trim(),
        descripcion: document.getElementById('prodDescripcion').value.trim() || undefined,
        precio: parseFloat(document.getElementById('prodPrecio').value),
        imagen_url: document.getElementById('prodImagen').value.trim() || undefined,
        estado: 'activo'
      };

      if (id) {
        const idx = products.findIndex(x => x.id === id);
        if (idx !== -1) { products[idx] = { ...products[idx], ...data }; }
      } else {
        data.id = genId();
        products.push(data);
      }
      saveState();
      renderProducts();
      closeModal('productModal');
      showPageAlert(id ? 'Producto actualizado' : 'Producto creado', 'success');
    });

    function deleteProduct(id) {
      if (!confirm('¿Eliminar este producto?')) return;
      products = products.filter(x => x.id !== id);
      saveState();
      renderProducts();
      showPageAlert('Producto eliminado', 'success');
    }

    function openPromoModal(promo) {
      const select = document.getElementById('promoProducto');
      if (products.length) {
        select.innerHTML = '<option value="">Seleccionar producto</option>' +
          products.filter(p => p.estado !== 'inactivo').map(p =>
            `<option value="${p.id}" ${promo && promo.idProducto === p.id ? 'selected' : ''}>${p.nombre}</option>`
          ).join('');
      } else {
        select.innerHTML = '<option value="">Crea productos primero</option>';
      }

      document.getElementById('promoModalTitle').textContent = promo ? 'Editar Promoción' : 'Nueva Promoción';
      document.getElementById('promoId').value = promo ? promo.id : '';
      document.getElementById('promoNombre').value = promo ? promo.nombre : '';
      document.getElementById('promoDescripcion').value = promo ? (promo.descripcion || '') : '';
      document.getElementById('promoMeta').value = promo ? promo.unidadesObjetivo : '';
      document.getElementById('promoFechaInicio').value = promo ? promo.fechaInicio?.split('T')[0] : '';
      document.getElementById('promoFechaFin').value = promo ? (promo.fechaFin?.split('T')[0] || '') : '';
      openModal('promoModal');
    }

    function editPromo(id) {
      const p = promos.find(x => x.id === id);
      if (p) openPromoModal(p);
    }

    document.getElementById('promoForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const id = document.getElementById('promoId').value;
      const data = {
        nombre: document.getElementById('promoNombre').value.trim(),
        descripcion: document.getElementById('promoDescripcion').value.trim() || undefined,
        idProducto: document.getElementById('promoProducto').value,
        unidadesObjetivo: parseInt(document.getElementById('promoMeta').value),
        fechaInicio: document.getElementById('promoFechaInicio').value,
        fechaFin: document.getElementById('promoFechaFin').value || undefined,
        estado: 'activa'
      };

      if (id) {
        const idx = promos.findIndex(x => x.id === id);
        if (idx !== -1) { promos[idx] = { ...promos[idx], ...data }; }
      } else {
        data.id = genId();
        promos.push(data);
      }
      saveState();
      renderPromos();
      closeModal('promoModal');
      showPageAlert(id ? 'Promoción actualizada' : 'Promoción creada', 'success');
    });

    function deletePromo(id) {
      if (!confirm('¿Eliminar esta promoción?')) return;
      promos = promos.filter(x => x.id !== id);
      saveState();
      renderPromos();
      showPageAlert('Promoción eliminada', 'success');
    }

    function showPageAlert(message, type) {
      const el = document.getElementById('pageAlert');
      el.textContent = message;
      el.className = `page-alert ${type} visible`;
      setTimeout(() => el.classList.remove('visible'), 4000);
    }

    // Init
    renderProducts();
    renderPromos();
  </script>
</body>
</html>
