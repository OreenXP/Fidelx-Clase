<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Fidelix</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo"><span class="logo-icon">&#9670;</span>Fidelix</a>
      <button class="nav-toggle" aria-label="Menú"><span></span><span></span><span></span></button>
      <ul class="nav-menu">
        <li><a href="index.html#servicios" class="nav-link">Servicios</a></li>
        <li><a href="register-client.html" class="nav-link">Registrarse</a></li>
        <li><a href="login.html" class="nav-btn">Iniciar Sesión</a></li>
      </ul>
    </div>
  </nav>

  <main class="form-page">
    <div class="form-container">
      <div class="form-box">
        <div class="form-header">
          <span class="logo-icon">&#9670;</span>
          <h1>Iniciar Sesión</h1>
          <p>Accede como cliente o como tienda</p>
        </div>
        <div class="alert"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="tu@correo.com" required>
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="password-wrapper">
              <input type="password" id="password" placeholder="••••••••" required>
              <button type="button" class="password-toggle" onclick="togglePassword(this)">👁️</button>
            </div>
            <div class="form-error"></div>
          </div>
          <div class="form-group" style="margin-bottom: 24px;">
            <label>Acceder como</label>
            <div style="display:flex;gap:12px;">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.9rem;font-weight:500;">
                <input type="radio" name="tipo" value="cliente" checked> Cliente
              </label>
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.9rem;font-weight:500;">
                <input type="radio" name="tipo" value="tienda"> Tienda
              </label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
        </form>
        <div class="form-footer">
          ¿No tienes cuenta?
          <a href="register-client.html">Regístrate como cliente</a> o
          <a href="register-store.html">como tienda</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const container = e.target.closest('.form-box');
      hideAlert(container);

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const tipo = document.querySelector('input[name="tipo"]:checked').value;

      let valid = true;
      [document.getElementById('email'), document.getElementById('password')].forEach(i => clearFieldError(i));

      if (!validateEmail(email)) {
        showFieldError(document.getElementById('email'), 'Correo electrónico inválido');
        valid = false;
      }
      if (!password) {
        showFieldError(document.getElementById('password'), 'La contraseña es requerida');
        valid = false;
      }
      if (!valid) return;

      const btn = e.target.querySelector('button[type="submit"]');
      setLoading(btn, true);

      try {
        const endpoint = tipo === 'cliente' ? '/login/login-cliente' : '/login/login-tienda';
        const res = await fetch(`http://localhost:3000${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password_hash: password })
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert(container, data.error || data.mensaje || 'Error al iniciar sesión');
          setLoading(btn, false);
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('tipo', tipo);
        localStorage.setItem('usuario', JSON.stringify(data.cliente || data.tienda));

        window.location.href = tipo === 'cliente' ? 'client-dashboard.html' : 'store-dashboard.html';
      } catch (err) {
        showAlert(container, err.message || 'Error de conexión con el servidor');
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
